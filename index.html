<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Store | Chandpara</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <header class="sticky-header">
        <div class="top-nav">
            <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <div class="logo">ASHIRBAD HARDWARE</div>
            <div class="cart-btn" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i></div>
        </div>
        <div class="search-section">
            <div class="search-input-group">
                <input type="text" id="search-bar" placeholder="What are you looking for?" onkeyup="filterProducts()">
                <button class="search-action-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="home-section">
            <h3 class="section-header">Shop by Category</h3>
            <div class="cat-visual-grid">
                <div class="cat-item-card" onclick="setCategory('tools')">
                    <img src="images/tools-cat.jpg" alt="Tools"><span>Tools</span>
                </div>
                <div class="cat-item-card" onclick="setCategory('electrical')">
                    <img src="images/elec-cat.jpg" alt="Electrical"><span>Electrical</span>
                </div>
                <div class="cat-item-card" onclick="setCategory('paint')">
                    <img src="images/paint-cat.jpg" alt="Paint"><span>Paints</span>
                </div>
                <div class="cat-item-card" onclick="setCategory('hardware')">
                    <img src="images/hard-cat.jpg" alt="Hardware"><span>Hardware</span>
                </div>
            </div>
        </section>

        <section id="featured-section" class="home-section">
            <h3 class="section-header">Best Sellers</h3>
            <div id="featured-list" class="pro-product-grid"></div>
        </section>

        <section class="home-section">
            <h3 class="section-header">All Products</h3>
            <div id="product-list" class="pro-product-grid"></div>
        </section>
    </main>

    <div id="sidebar" class="side-panel-left">
        <div class="side-header">
            <span><i class="fas fa-store"></i> NAVIGATION</span>
            <span onclick="toggleSidebar()" class="close-x">&times;</span>
        </div>
        <ul class="side-links">
            <li onclick="setCategory('all')"><i class="fas fa-th-large"></i> All Products</li>
            <div class="admin-divider">OWNER ZONE</div>
            <li onclick="openLoginModal()" class="admin-link"><i class="fas fa-user-shield"></i> Owner Dashboard</li>
        </ul>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content auth-card">
            <div class="auth-header"><h3>Secure Login</h3></div>
            <div class="auth-body">
                <input type="text" id="adminUser" placeholder="Username">
                <input type="password" id="adminPass" placeholder="Password">
                <button class="pro-add-btn" onclick="handleLogin()">AUTHENTICATE</button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="modal-overlay">
        <div class="modal-content dashboard-pro">
            <div class="dash-nav"><h2><i class="fas fa-cloud"></i> Cloud Dashboard</h2><button onclick="closeDashboard()">Logout</button></div>
            <div class="stats-row">
                <div class="kpi-card"><span>ORDERS</span><span id="totalSalesCount">0</span></div>
                <div class="kpi-card highlight"><span>REVENUE</span><span id="totalRevenue">₹0</span></div>
            </div>
            <div class="table-container">
                <table><thead><tr><th>DATE</th><th>ITEMS</th><th>VALUE</th></tr></thead><tbody id="salesBody"></tbody></table>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal-overlay"></div>

    <div id="cart-panel" class="side-panel-right">
        <div class="cart-header">YOUR ORDER <span onclick="toggleCart()">&times;</span></div>
        <div id="cart-items-list"></div>
        <div class="cart-summary">
            <div class="total-row">Total: <span id="cart-total-amt">₹0</span></div>
            <button class="checkout-btn-wa" onclick="sendToWhatsApp()">ORDER VIA WHATSAPP</button>
            <button class="clear-all-link" onclick="clearCart()">Clear All</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
