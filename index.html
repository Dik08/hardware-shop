<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashirbad Hardware | Chandpara</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="nav-top">
            <div class="header-icon" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <div class="brand-name">ASHIRBAD HARDWARE</div>
            <div class="header-icon" onclick="toggleCart()"><i class="fas fa-shopping-bag"></i></div>
        </div>
        <div class="search-area">
            <div class="search-wrap">
                <input type="text" id="search-bar" placeholder="Find products..." onkeyup="filterProducts()">
                <button class="search-go"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <div id="sidebar" class="flyout-panel left">
        <div class="panel-head">MENU <span onclick="toggleSidebar()">&times;</span></div>
        <ul class="panel-links">
            <li onclick="setCategory('all')"><i class="fas fa-home"></i> Home</li>
            <li onclick="openLoginModal()" class="owner-zone"><i class="fas fa-user-shield"></i> Owner Login</li>
        </ul>
    </div>

    <div id="cart-panel" class="flyout-panel right">
        <div class="panel-head">YOUR ORDER <span onclick="toggleCart()">&times;</span></div>
        <div class="customer-info-box">
            <input type="text" id="cust-name" placeholder="Full Name *">
            <input type="tel" id="cust-phone" placeholder="Phone Number *">
        </div>
        <div id="cart-items-list" class="panel-scrollable"></div>
        <div class="panel-bottom">
            <div class="grand-total"><span>Total:</span><span id="cart-total-amt">₹0</span></div>
            <button class="blue-btn" onclick="sendToWhatsApp()"><i class="fab fa-whatsapp"></i> Confirm & Send</button>
        </div>
    </div>

    <main class="page-container">
        <section id="featured-section" style="display:none;">
            <h2 class="section-title">⭐ Best Sellers</h2>
            <div id="featured-list" class="product-grid"></div>
        </section>
        <section id="all-products">
            <h2 class="section-title">All Products</h2>
            <div id="product-list" class="product-grid"></div>
        </section>
    </main>

    <footer class="shop-footer">
        <p><i class="fas fa-map-marker-alt"></i> Main Road, Chandpara, 743245</p>
        <p>© 2026 Ashirbad Hardware | Developed by Dik</p>
    </footer>

    <div id="adminDashboard" class="modal-root">
        <div class="modal-box large">
            <div class="dash-nav">
                <h2>Business Analytics</h2>
                <button onclick="closeDashboard()">Exit</button>
            </div>
            
            <div class="dash-search-wrap">
                <input type="text" id="dash-search" placeholder="Search by Name or Order ID..." onkeyup="searchOrders()">
                <i class="fas fa-search"></i>
            </div>

            <div class="dash-kpi">
                <div class="kpi"><span>Total Orders</span><p id="totalSalesCount">0</p></div>
                <div class="kpi blue"><span>Revenue</span><p id="totalRevenue">₹0</p></div>
            </div>

            <div class="table-scroll">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>ID & Date</th>
                            <th>Customer Details</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="salesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal-root">
        <div class="modal-box small">
            <h3>Admin Login</h3>
            <input type="text" id="adminUser" placeholder="User">
            <input type="password" id="adminPass" placeholder="Pass">
            <button class="blue-btn" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="productModal" class="modal-root"></div>
    <script src="app.js"></script>
</body>
</html>
